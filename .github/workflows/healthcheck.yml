# Плановая проверка доступности API (внешний мониторинг из GitHub).
# Задайте в репозитории: Settings → Secrets and variables → Actions → Variables
#   API_HEALTH_URL = https://api.ваш-домен.ru/health
# Уведомления о падении: включите в профиле GitHub уведомления по Actions или смотрите вкладку Actions.

name: Health check

on:
  schedule:
    # Каждые 10 минут (UTC). Измените при необходимости.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - name: GET /health
        env:
          URL: ${{ vars.API_HEALTH_URL }}
        run: |
          if [ -z "${URL:-}" ]; then
            echo "Задайте переменную репозитория API_HEALTH_URL (например https://api.example.com/health)"
            exit 1
          fi
          echo "Checking $URL"
          curl -fsS --max-time 25 -o /tmp/health.json "$URL"
          cat /tmp/health.json
          python3 -c "import json,sys; d=json.load(open('/tmp/health.json')); assert d.get('status')=='ok', d"
