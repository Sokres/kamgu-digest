name: Deploy

# CD: SSH на сервер и ./deploy/remote-update.sh (git pull + docker compose).
# Секреты: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH (см. deploy/README.md).
#
# Автодеплой: push в main при изменениях в backend/front/deploy/compose.
# Вручную: Actions → Deploy → Run workflow.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "front/**"
      - "deploy/**"
      - "docker-compose.prod.yml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            bash deploy/remote-update.sh
