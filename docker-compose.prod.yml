# Прод: API + PostgreSQL. Запуск из корня репозитория:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
# См. deploy/README.md и deploy/.env.production.example

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-kamgu_digest}
    volumes:
      - kamgu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      SNAPSHOT_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kamgu_digest}
      # Браузерный фронт на другом хосте; без этого остаётся дефолт localhost:5173 → CORS в проде.
      CORS_ORIGINS: ${CORS_ORIGINS:-https://kamgu.24msg.ru}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  kamgu_pgdata:
